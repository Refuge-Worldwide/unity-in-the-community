<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unity in the Community</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background-color: black;
        position: relative;
      }
      img {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        display: block;
      }
      .email-icon {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 40px;
        color: white;
        text-decoration: none;
        z-index: 10;
        transition: opacity 0.3s;
      }
      .email-icon:hover {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <img
      src="unity.jpg"
      alt="Group of people smiling standing in front of blue and orange draped sheets"
    />
    <a href="mailto:hello@unityinthecommunity.de" class="email-icon">✉️</a>
  </body>
</html>
